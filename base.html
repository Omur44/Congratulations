<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>С днём рождения</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      overflow: hidden;
      color: white;
    }

    .container {
      margin-top: 80px;
      z-index: 2;
      position: relative;
    }

    h1 {
      font-size: 42px;
      animation: fade 2s;
    }

    p {
      font-size: 20px;
    }

    img {
      width: 220px;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: white;
      color: #ff4081;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    #hiddenText {
      display: none;
      margin-top: 20px;
      font-size: 22px;
      animation: fade 1s;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    /* сердечки */
    .heart {
      position: absolute;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {transform: translateY(100vh);}
      100% {transform: translateY(-10vh);}
    }

    /* конфетти */
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background: yellow;
      animation: fall 4s linear infinite;
    }

    @keyframes fall {
      0% {transform: translateY(-10vh);}
      100% {transform: translateY(100vh);}
    }
  </style>
</head>

<body>

<div class="container">
  <h1>С днём рождения, Мээрим Эже 🎉</h1>
  <p>Желаю тебе счастья, здоровья и исполнения всех мечт ❤️</p>

  <img src="photo.jpeg">

  <br>
  <button onclick="showText()">Нажми 🎁</button>

  <div id="hiddenText">
    Ты самая лучшая! Спасибо за всё 💖
  </div>
</div>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function showText() {
  document.getElementById("hiddenText").style.display = "block";
}

/* сердечки */
for (let i = 0; i < 20; i++) {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 20 + "px";
  heart.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(heart);
}

/* конфетти */
for (let i = 0; i < 30; i++) {
  let conf = document.createElement("div");
  conf.className = "confetti";
  conf.style.left = Math.random() * 100 + "vw";
  conf.style.background = hsl(${Math.random()*360},100%,50%);
  conf.style.animationDuration = (2 + Math.random() * 3) + "s";
  document.body.appendChild(conf);
}
</script>

</body>
</html>
